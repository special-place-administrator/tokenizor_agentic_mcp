name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-release-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.version }}
      npm_tarball: ${{ steps.versions.outputs.npm_tarball }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: versions
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          NPM_VERSION="$(node -p "require('./npm/package.json').version")"

          if [[ -z "$TAG_VERSION" ]]; then
            echo "::error::Unable to derive version from tag '${GITHUB_REF_NAME}'."
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match Cargo.toml version '$CARGO_VERSION'."
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$NPM_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match npm/package.json version '$NPM_VERSION'."
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tarball=tokenizor-mcp-$TAG_VERSION.tgz" >> "$GITHUB_OUTPUT"

  build:
    needs: validate-release-version
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tokenizor-mcp-windows-x64.exe
            binary: target/x86_64-pc-windows-msvc/release/tokenizor_agentic_mcp.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tokenizor-mcp-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/tokenizor_agentic_mcp
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tokenizor-mcp-macos-arm64
            binary: target/aarch64-apple-darwin/release/tokenizor_agentic_mcp
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tokenizor-mcp-macos-x64
            binary: target/x86_64-apple-darwin/release/tokenizor_agentic_mcp

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  build-npm-package:
    needs: validate-release-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build npm tarball
        working-directory: npm
        run: npm pack

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: npm/${{ needs.validate-release-version.outputs.npm_tarball }}
          if-no-files-found: error

  release:
    needs:
      - build
      - build-npm-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  npm-publish:
    needs:
      - validate-release-version
      - build-npm-package
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist

      - name: Publish to npm
        run: npm publish "dist/${{ needs.validate-release-version.outputs.npm_tarball }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
