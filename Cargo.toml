[package]
name = "tokenizor_agentic_mcp"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
rmcp = { version = "1.1.0", features = ["transport-io"] }
schemars = "1.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.48", features = ["io-std", "macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
